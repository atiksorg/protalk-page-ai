<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ProTalk AI — Резюме</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="panel">

    <!-- Шапка -->
    <header class="panel-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8V4H8"/>
          <rect width="16" height="12" x="4" y="8" rx="2"/>
          <path d="M2 14h2"/>
          <path d="M20 14h2"/>
          <path d="M15 13v2"/>
          <path d="M9 13v2"/>
        </svg>
        ProTalk AI
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="icon-btn" title="Обновить резюме">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Источник: заголовок и URL страницы -->
    <div id="pageInfo" class="page-info hidden">
      <span id="pageTitle" class="page-title"></span>
      <span id="pageUrl" class="page-url">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span id="pageUrlText"></span>
      </span>
    </div>

    <!-- Баннер: страница изменилась -->
    <div id="staleBanner" class="stale-banner hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Страница изменилась —
      <button id="staleRefreshBtn">обновить резюме</button>
    </div>

    <!-- Основной контент -->
    <main id="content" class="content">

      <!-- idle -->
      <div id="stateIdle" class="state-block">
        <p class="hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"/>
            <rect width="16" height="12" x="4" y="8" rx="2"/>
            <path d="M2 14h2"/>
            <path d="M20 14h2"/>
            <path d="M15 13v2"/>
            <path d="M9 13v2"/>
          </svg>
          Нажмите кнопку обновления чтобы получить резюме текущей страницы
        </p>
      </div>

      <!-- loading -->
      <div id="stateLoading" class="state-block hidden">
        <div class="spinner"></div>
        <p class="hint">Анализирую страницу...</p>
      </div>

      <!-- pageText — отображение текста страницы -->
      <div id="statePageText" class="state-block hidden">
        <div class="page-text-header">
          <div class="page-text-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            Текст страницы
          </div>
          <button id="copyPageTextBtn" class="icon-btn" title="Копировать текст">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
            </svg>
          </button>
        </div>
        <div class="page-text-wrapper">
          <textarea id="pageTextContent" class="page-textarea" readonly placeholder="Текст страницы будет отображён здесь..."></textarea>
        </div>
        <div class="page-text-actions">
          <button id="summarizePageBtn" class="btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
            Анализировать страницу
          </button>
        </div>
        <div id="pageTextQuickActions" class="quick-actions hidden">
          <!-- Кнопки быстрых действий будут добавлены сюда динамически -->
        </div>
      </div>

      <!-- done / stale — резюме -->
      <div id="stateSummary" class="state-block hidden">
        <div id="summaryContent" class="summary-content"></div>
      </div>

      <!-- error -->
      <div id="stateError" class="state-block hidden">
        <p id="errorMessage" class="error-text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span></span>
        </p>
        <button id="retryBtn" class="btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
          Попробовать снова
        </button>
      </div>

    </main>

    <!-- Подвал: уточняющий вопрос -->
    <footer class="panel-footer">
      <div class="question-row">
        <textarea
          id="questionInput"
          class="question-input"
          placeholder="Уточняющий вопрос по странице..."
          rows="2"
        ></textarea>
        <button id="askBtn" class="ask-btn" title="Задать вопрос">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"/>
            <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div id="answerArea" class="answer-area hidden">
        <div id="answerLoading" class="hidden">
          <div class="spinner small"></div>
        </div>
        <div id="answerText" class="answer-text"></div>
      </div>
    </footer>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
